services:
  # 1. 브랜드 쇼룸 & 결제 서버 (FastAPI)
  - type: web
    name: affilistay-showroom
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: affilistay-db
          property: connectionString
      - key: SERVICE_TYPE
        value: showroom
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    dockerCommand: "uvicorn checkout_server:app --host 0.0.0.0 --port $PORT"

  # 2. 호스트 전용 포털 (Streamlit)
  - type: web
    name: affilistay-admin
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: affilistay-db
          property: connectionString
      - key: SERVICE_TYPE
        value: admin
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    # 배포 시 실행 명령어를 dockerCommand로 설정합니다.
    dockerCommand: "streamlit run admin_dashboard_ui.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"

databases:
  # 3. 전용 관리형 데이터베이스 (PostgreSQL)
  - name: affilistay-db
    plan: free
